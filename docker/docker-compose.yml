version: '3.9'

services:

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1

    ports:
      - "8087:8081"

    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry

      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9092

    depends_on:
      - kafka

  postgres-auth:
    image: postgres:16

    command:
      - postgres
      - -c
      - wal_level=logical

    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pAskal123
    ports:
      - "5433:5432"

  postgres-product:
    image: postgres:16

    command:
      - postgres
      - -c
      - wal_level=logical

    environment:
      POSTGRES_DB: product_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pAskal123
    ports:
      - "5434:5432"

  postgres-inventory:
    image: postgres:16

    command:
      - postgres
      - -c
      - wal_level=logical

    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pAskal123
    ports:
      - "5435:5432"

  postgres-order:
    image: postgres:16

    command:
      - postgres
      - -c
      - wal_level=logical

    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pAskal123

    ports:
      - "5436:5432"

  postgres-notification:
    image: postgres:16

    command:
      - postgres
      - -c
      - wal_level=logical

    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pAskal123

    ports:
      - "5437:5432"

  postgres-analytics:
    image: postgres:16

    command:
      - postgres
      - -c
      - wal_level=logical

    environment:
      POSTGRES_DB: analytics_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pAskal123

    ports:
      - "5438:5432"

  postgres-shipping:
    image: postgres:16

    command:
      - postgres
      - -c
      - wal_level=logical

    environment:
      POSTGRES_DB: shipping_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pAskal123

    ports:
      - "5439:5432"

  postgres-payment:
    image: postgres:16

    command:
      - postgres
      - -c
      - wal_level=logical

    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pAskal123

    ports:
      - "5440:5432"

  postgres-outbox:
    image: postgres:16

    environment:
      POSTGRES_DB: outbox_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pAskal123

    ports:
      - "5441:5432"

  debezium:
    image: debezium/connect:3.0.0.Final

    ports:
      - "8083:8083"

    depends_on:
      - kafka

    environment:
      BOOTSTRAP_SERVERS: kafka:9092

      GROUP_ID: 1

      CONFIG_STORAGE_TOPIC: connect_configs

      OFFSET_STORAGE_TOPIC: connect_offsets

      STATUS_STORAGE_TOPIC: connect_statuses

      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter

      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter

      KEY_CONVERTER_SCHEMAS_ENABLE: false

      VALUE_CONVERTER_SCHEMAS_ENABLE: false

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.1

    environment:
      discovery.type: single-node
      xpack.security.enabled: false

    ports:
      - "9200:9200"

  kafka:
    image: apache/kafka:latest

    ports:
      - "9092:9092"
      - "29092:29092"

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: PLAINTEXT://:9092,EXTERNAL://:29092,CONTROLLER://:9093

      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

  kafka-ui:
    image: provectuslabs/kafka-ui:latest

    ports:
      - "8085:8080"

    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

    depends_on:
      - kafka

  jaeger:
    image: jaegertracing/all-in-one:latest

    ports:
      - "16686:16686"
      - "4318:4318"

  connector-init:
    image: curlimages/curl:latest

    depends_on:
      - debezium

    volumes:
      - ./connectors:/connectors

    entrypoint: >
      sh -c "
      echo 'Waiting for Debezium...';
      until curl -s http://debezium:8083/connectors; do
        sleep 5;
      done;

      curl -X POST -H 'Content-Type: application/json' http://debezium:8083/connectors -d @/connectors/debezium-connector-auth.json;

      curl -X POST -H 'Content-Type: application/json' http://debezium:8083/connectors -d @/connectors/debezium-connector-product.json;

      curl -X POST -H 'Content-Type: application/json' http://debezium:8083/connectors -d @/connectors/debezium-connector-order.json;

      curl -X POST -H 'Content-Type: application/json' http://debezium:8083/connectors -d @/connectors/debezium-connector-inventory.json;

      curl -X POST -H 'Content-Type: application/json' http://debezium:8083/connectors -d @/connectors/debezium-connector-shipping.json;

      curl -X POST -H 'Content-Type: application/json' http://debezium:8083/connectors -d @/connectors/debezium-connector-payment.json;

      curl -X POST -H 'Content-Type: application/json' http://debezium:8083/connectors -d @/connectors/debezium-connector-notification.json;

      curl -X POST -H 'Content-Type: application/json' http://debezium:8083/connectors -d @/connectors/debezium-connector-analytics.json;
      "