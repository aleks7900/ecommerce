server:
  port: 8080

security:
  jwt:
    jwk-set-uri: http://localhost:8081/.well-known/jwks.json
    issuer-uri: http://localhost:8081

spring:
  application:
    name: api-gateway

  data:
    redis:
      host: localhost
      port: 6379

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8081/.well-known/jwks.json
          issuer-uri: http://localhost:8081

  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
            allowedHeaders:
              - "*"

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin

      routes:

        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**

        - id: product-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/products/**

          filters:

            - name: CircuitBreaker

              args:
                name: productService

                fallbackUri: forward:/fallback/products

        - id: inventory-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/inventory/**

        - id: order-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/orders/**

        - id: payment-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/payments/**

        - id: shipping-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/shipping/**

        - id: notification-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/notifications/**

        - id: analytics-service
          uri: http://localhost:8088
          predicates:
            - Path=/api/analytics/**

        - id: analytics-streams-service
          uri: http://localhost:8089
          predicates:
            - Path=/api/stream-analytics/**

        - id: search-service
          uri: http://localhost:8090
          predicates:
            - Path=/api/search/**

      httpclient:
        connect-timeout: 5000
        response-timeout: 10s

springdoc:

  swagger-ui:

    urls:

      - name: auth-service
        url: /v3/api-docs/auth

      - name: product-service
        url: /v3/api-docs/products

      - name: inventory-service
        url: /v3/api-docs/inventory

      - name: order-service
        url: /v3/api-docs/orders

      - name: payment-service
        url: /v3/api-docs/payments

      - name: shipping-service
        url: /v3/api-docs/shipping

      - name: notification-service
        url: /v3/api-docs/notifications

      - name: search-service
        url: /v3/api-docs/search


management:
  endpoints:
    web:
      exposure:
        include: "*"

  endpoint:
    health:
      show-details: always

  tracing:
    enabled: true
    sampling:
      probability: 1.0

  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces

logging:
  level:
    org.springframework.cloud.gateway: INFO
