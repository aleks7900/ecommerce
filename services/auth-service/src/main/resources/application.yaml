server:
  port: 8081

spring:

  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://localhost:5433/auth_db
    username: postgres
    password: pAskal123

  jpa:
    hibernate:
      ddl-auto: update

    properties:
      hibernate:
